name: Build ISO d'installation (manuel)

# Génère une ISO d'installation Anaconda à partir de l'image publiée (Méthode B,
# docs/05). Déclenchement manuel uniquement. Le chiffrement LUKS se choisit DANS
# l'installateur (BIB ne chiffre pas — docs/06).
on:
  workflow_dispatch:
    inputs:
      image:
        description: "Profil à graver dans l'ISO"
        type: choice
        default: silverblue-x13
        options:
          - silverblue-x13
          - silverblue-x13-sysadmin
      tag:
        description: "Tag de l'image à graver dans l'ISO"
        default: latest
        required: true

# bootc-image-builder : épingler de préférence par DIGEST pour des ISO reproductibles.
# Récupérer le digest courant :
#   skopeo inspect --format '{{.Digest}}' docker://quay.io/centos-bootc/bootc-image-builder:latest
# puis remplacer la valeur par : quay.io/centos-bootc/bootc-image-builder@sha256:<digest>
env:
  BIB_IMAGE: quay.io/centos-bootc/bootc-image-builder:latest

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read        # lecture de l'image sur ghcr (utile si package privé)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Définir le registre (ghcr exige des minuscules)
        run: echo "IMAGE_REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Login ghcr.io
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pré-tirer l'image (pour le stockage local partagé avec BIB)
        run: sudo podman pull "${IMAGE_REGISTRY}/${{ inputs.image }}:${{ inputs.tag }}"

      - name: Construire l'ISO (bootc-image-builder)
        run: |
          mkdir -p output
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v "${PWD}/bootc-image-builder/config.toml:/config.toml:ro" \
            -v "${PWD}/output:/output" \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            "${BIB_IMAGE}" \
              --type anaconda-iso \
              --rootfs btrfs \
              --config /config.toml \
              "${IMAGE_REGISTRY}/${{ inputs.image }}:${{ inputs.tag }}"

      - name: Publier l'ISO en artefact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.image }}-install-iso
          path: output/**/*.iso
          if-no-files-found: error
