# =============================================================================
#  Config bootc-image-builder (BIB) — Méthode B : ISO d'installation personnalisée.
#  Utilisée par .github/workflows/build-iso.yml. Schéma : https://osbuild.org/docs/bootc/
#
#  IMPORTANT (docs/06) : BIB ne gère PAS le chiffrement LUKS. Le type "anaconda-iso"
#  produit un installateur interactif où l'on COCHE « Chiffrer mes données » à
#  l'installation. Ce fichier ne sert qu'à pré-remplir un utilisateur, la locale et
#  d'éventuels kargs. Pour du non-interactif chiffré, fournir un kickstart Anaconda.
# =============================================================================

[customizations]

# Locale et clavier de la flotte (Suisse romande).
[customizations.locale]
# Flotte bilingue DE-CH / FR-CH : les DEUX locales sont installées/disponibles.
# La 1re est le défaut ; chaque utilisateur choisit sa langue au login GDM et dans
# Paramètres GNOME → Région et langue. (Bascule possible : mettre de_CH en 1er.)
languages = ["fr_CH.UTF-8", "de_CH.UTF-8"]
# Clavier par défaut (modifiable par utilisateur). Les deux dispositions suisses
# sont proposées à tout le monde via dconf (voir system_files/.../00-fleet-defaults).
keyboard = "ch(fr)"

[customizations.timezone]
timezone = "Europe/Zurich"

# Compte de gestion privilégié (wheel/sudo). Connexion par clé SSH ; mot de passe initial
# "changeme" (HACHÉ) uniquement pour permettre sudo et le premier login local.
# ⚠️ Le hash est PUBLIC : changer le mot de passe dès le premier login (passwd admin).
# Masqué de la liste GDM via system_files/usr/lib/tmpfiles.d/fleet-gdm-hide-admin.conf.
[[customizations.user]]
name = "admin"
groups = ["wheel"]
password = "$6$c65R4wMFoMCgb8xR$YA5IidAIWk./KNSsett7QljenuDU.KcQyu1AgCqnqilHFTLZiXFRPXAsaGf0RQ5.UXMUCn4uAI4PWk.xcU2at/"
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPnQNBmneOgeUGh4MOwWqv6jXnWkGdkmBKGxdvcC7Dv1 robin.morand@szh.ch"

# Kernel args à l'installation (laisser vide ; les kargs durables sont dans
# system_files/usr/lib/bootc/kargs.d/10-fleet.toml).
# [customizations.kernel]
# append = ""

# Utilisateur de bureau (session GNOME). NON privilégié : aucun groupe → PAS de wheel/sudo.
# Mot de passe initial "changeme" (HACHÉ). Le hash d'un mot de passe aussi connu n'est PAS
# un secret : c'est le changement OBLIGATOIRE au premier login (service
# fleet-force-passwd-change) qui protège. Le nom d'AFFICHAGE "SZH-CSPS" (champ GECOS) est
# posé par ce même service au 1er boot — config.toml ne gère pas de nom d'affichage.
[[customizations.user]]
name = "szh-csps"
password = "$6$c65R4wMFoMCgb8xR$YA5IidAIWk./KNSsett7QljenuDU.KcQyu1AgCqnqilHFTLZiXFRPXAsaGf0RQ5.UXMUCn4uAI4PWk.xcU2at/"
