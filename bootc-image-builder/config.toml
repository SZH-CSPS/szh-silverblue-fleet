# =============================================================================
#  Config bootc-image-builder (BIB) — Méthode B : ISO d'installation personnalisée.
#  Utilisée par .github/workflows/build-iso.yml.
#
#  CORRECTIF (erreur « kickstart users … not compatible with user-supplied kickstart
#  content ») : BIB interdit d'avoir À LA FOIS des [[customizations.user]] structurés ET
#  un kickstart fourni (installer.kickstart.contents). Comme le chiffrement LUKS EXIGE le
#  kickstart (autopart --encrypted ; BIB n'a pas de chiffrement natif — vérifié en source),
#  on met TOUT dans le kickstart : partitionnement chiffré + comptes. Plus aucun bloc
#  [[customizations.user]].
#
#  Passphrase d'AMORÇAGE LUKS = « changeme » (publique) → à changer au 1er login, puis
#  fleet-tpm-enroll lie le TPM2. Mots de passe utilisateurs = hash de « changeme » → à
#  changer au 1er login (le hash d'un mot de passe connu n'est pas un secret).
# =============================================================================

[customizations]

# Locale et clavier (Suisse, bilingue FR-CH / DE-CH). Gérés en customizations structurées :
# ils ne génèrent PAS de commandes « user/group », donc aucun conflit avec le kickstart.
[customizations.locale]
languages = ["fr_CH.UTF-8", "de_CH.UTF-8"]
keyboard = "ch(fr)"

[customizations.timezone]
timezone = "Europe/Zurich"

# --- Kickstart unique : chiffrement LUKS + comptes ---------------------------
# (Remplace les anciens [[customizations.user]], qui entraient en conflit avec ce bloc.)
[customizations.installer.kickstart]
contents = """
# --- Partitionnement chiffré (LUKS) ---
# Passphrase d'amorçage « changeme » (à changer au 1er login). Le type btrfs est fixé ICI :
# du coup, retire « --rootfs btrfs » de la commande podman pour ne PAS définir le système
# de fichiers à deux endroits (voir note en bas du build-iso.yml).
zerombr
clearpart --all --initlabel
autopart --type btrfs --encrypted --passphrase=changeme

# --- Comptes (équivalent des anciens [[customizations.user]]) ---
# admin : privilégié (wheel/sudo), connexion par clé SSH. Mot de passe initial haché.
user --name=admin --groups=wheel --iscrypted --password=$6$c65R4wMFoMCgb8xR$YA5IidAIWk./KNSsett7QljenuDU.KcQyu1AgCqnqilHFTLZiXFRPXAsaGf0RQ5.UXMUCn4uAI4PWk.xcU2at/
sshkey --username=admin "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPnQNBmneOgeUGh4MOwWqv6jXnWkGdkmBKGxdvcC7Dv1 robin.morand@szh.ch"

# szh-csps : utilisateur de bureau, NON privilégié (aucun groupe → pas de sudo).
user --name=szh-csps --iscrypted --password=$6$c65R4wMFoMCgb8xR$YA5IidAIWk./KNSsett7QljenuDU.KcQyu1AgCqnqilHFTLZiXFRPXAsaGf0RQ5.UXMUCn4uAI4PWk.xcU2at/

# Verrouille la connexion root directe. (Si BIB se plaint d'un « rootpw » en double,
# supprime cette ligne — peu probable ici puisqu'on ne déclare plus d'users structurés.)
rootpw --lock
"""
