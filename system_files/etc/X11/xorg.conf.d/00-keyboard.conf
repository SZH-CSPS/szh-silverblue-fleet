# Disposition clavier SYSTÈME (console + écran de connexion GDM/greeter Wayland).
# Le greeter GDM ne lit PAS le dconf utilisateur (org.gnome.desktop.input-sources) ; il
# utilise la config XKB système gérée par systemd-localed → ce fichier fait foi.
#
# Suisse romande par défaut (ch + variante fr), puis suisse alémanique (ch, variante par
# défaut = allemand). Bascule possible au login via l'indicateur de clavier.
Section "InputClass"
        Identifier "system-keyboard"
        MatchIsKeyboard "on"
        Option "XkbLayout" "ch,ch"
        Option "XkbVariant" "fr,"
EndSection
