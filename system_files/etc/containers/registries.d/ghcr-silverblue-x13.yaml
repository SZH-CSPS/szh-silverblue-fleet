# Imposition cosign ACTIVE. Indique que les signatures de ces images sont des
# attachments sigstore (produits par `cosign sign`), stockes a cote de l'image.
docker:
  ghcr.io/szh-csps/silverblue-x13:
    use-sigstore-attachments: true
  ghcr.io/szh-csps/silverblue-x13-sysadmin:
    use-sigstore-attachments: true
