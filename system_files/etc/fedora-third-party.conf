# État des dépôts tiers (fedora-third-party), fixé pour TOUTE la flotte.
# enabled = 1 → dépôts tiers activés par défaut pour tous les utilisateurs, et la
# logithèque (GNOME Software) n'affiche PLUS l'invite « Activer / Ignorer » (qui exigeait
# une auth admin par poste). On livre ce fichier directement (déterministe en image mode)
# plutôt que de dépendre de « fedora-third-party enable » au build.
[main]
enabled = 1
