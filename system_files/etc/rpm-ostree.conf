# Configuration du démon rpm-ostree (flotte).
# AutomaticUpdatePolicy=stage : le timer rpm-ostreed-automatic.timer (activé au build)
# télécharge et PRÉPARE automatiquement la nouvelle image (silverblue-x13 est
# reconstruite chaque nuit avec les correctifs Fedora). L'application se fait au
# REDÉMARRAGE suivant — atomique, et protégée par greenboot (rollback si boot raté).
# Sans cela, les rebuilds quotidiens n'atteindraient les postes que manuellement.
[Daemon]
AutomaticUpdatePolicy=stage
