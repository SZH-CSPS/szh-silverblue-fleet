# =============================================================================
#  TLP — gestion d'énergie de la flotte ThinkPad (X13/T14/X1).
#  TLP lit /etc/tlp.d/*.conf par ordre alphabétique ; ce fichier surcharge les
#  défauts. power-profiles-daemon est masqué au build (build.sh) pour éviter le
#  conflit. Vérifier l'état : tlp-stat -s   |   appliquer à chaud : sudo tlp start
#  Doc des clés : https://linrunner.de/tlp/settings/  (voir docs/03-configuration.md)
# =============================================================================

# --- Profils CPU -------------------------------------------------------------
# Sur secteur : performance raisonnable ; sur batterie : économie.
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

# Gouverneur intel_pstate/amd-pstate (selon le CPU ; "powersave" reste correct
# sur AC avec les pstate HWP modernes — il ne bride pas la fréquence max).
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Turbo activé sur secteur, désactivé sur batterie (autonomie + chaleur).
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# --- Plateforme --------------------------------------------------------------
PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=low-power

# --- Seuils de charge batterie (préserve la santé de la batterie) ------------
# Supporté par les ThinkPad (pilote thinkpad_acpi / firmware Lenovo).
# Charge à partir de 75 %, arrête à 80 % → idéal pour des postes souvent sur secteur.
# Mettre STOP=100 pour une autonomie maximale en déplacement.
START_CHARGE_THRESH_BAT0=75
STOP_CHARGE_THRESH_BAT0=80

# --- USB & PCIe --------------------------------------------------------------
USB_AUTOSUSPEND=1
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto

# --- Wi-Fi -------------------------------------------------------------------
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on
