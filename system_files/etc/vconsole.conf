# Keymap de la CONSOLE (TTY) et — visé ici — de l'invite de mot de passe LUKS au boot.
# Suisse romande (fr_CH). NB : XKB « ch(fr) » → keymap console « fr_CH ».
# ⚠️ Pour que l'INVITE LUKS (initramfs) en bénéficie, il faut que le keymap soit chargé
#    dans l'initramfs. Comme build.sh NE régénère PAS l'initramfs, on s'appuie sur le
#    karg rd.vconsole.keymap (voir usr/lib/bootc/kargs.d/10-fleet.toml) qui demande à
#    systemd-vconsole-setup de charger fr_CH tôt — à condition que ce keymap soit présent
#    dans l'initramfs générique Fedora (à VÉRIFIER au boot). Sinon : régénérer l'initramfs
#    avec le keymap (voir note dans build.sh / docs).
# Vérifier le nom exact dispo :  localectl list-keymaps | grep -iE 'CH|sg'
KEYMAP=fr_CH
