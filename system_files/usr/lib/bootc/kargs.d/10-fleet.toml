# Arguments noyau de la flotte, appliqués par bootc (usr/lib/bootc/kargs.d/*.toml).
# Les modifier ici les versionne avec l'image (cohérent sur toute la flotte)
# plutôt que via grubby poste par poste.
#
# rhgb + quiet : boot graphique silencieux → Plymouth (thème Fedora par défaut)
# affiche le prompt LUKS/PIN en graphique. Sans rhgb, le prompt fonctionne aussi,
# mais en mode texte.
#
# Mitigations CPU : on garde le défaut du noyau (mitigations=auto). N'ajouter
# "mitigations=auto,nosmt" (désactive l'hyperthreading, ~-20/30 % multi-thread)
# que si une politique de sécurité l'exige explicitement.
#
# Filtrer par architecture si nécessaire :  match-architectures = ["x86_64"]
kargs = ["rhgb", "quiet"]
