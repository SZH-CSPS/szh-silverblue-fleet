# =============================================================================
#  Masque le compte de gestion "admin" de la liste de l'écran de connexion GDM.
#  Résultat : GDM n'affiche que "szh-csps" (compte de bureau) par défaut. "admin"
#  reste connectable via « Non répertorié ? » → taper "admin" puis le mot de passe.
#
#  Mécanisme : AccountsService (SystemAccount=true dans le cache du compte). Posé au
#  premier boot par systemd-tmpfiles — recommandé en image mode (bootc) : on n'embarque
#  PAS de contenu brut dans /var (sinon `bootc container lint` le signale), on le crée.
#
#  Note : ce drapeau retire aussi à "admin" le statut "administrateur" au sens de
#  l'UI GNOME (déverrouillage polkit des Paramètres). Sans impact sur sudo en ligne
#  de commande (admin reste dans wheel). C'est un compte de gestion, pas de bureau.
#  Le fichier n'est écrit que s'il n'existe pas encore (pas d'écrasement ultérieur).
# =============================================================================
d /var/lib/AccountsService 0755 root root -
d /var/lib/AccountsService/users 0700 root root -
f /var/lib/AccountsService/users/admin 0644 root root - [User]\nSystemAccount=true\n
