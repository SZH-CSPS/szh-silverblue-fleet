# =============================================================================
#  Conteneur « pipeline » — chaîne éditoriale WeasyPrint + Pandoc.
#  Crée/recrée : distrobox assemble create --file /usr/share/fleet/distrobox/pipeline.ini
#  Détails et usage : docs/04-applications.md.
#
#  On isole ici les dépendances NATIVES de WeasyPrint (Pango, cairo, gdk-pixbuf,
#  harfbuzz, libffi) + Pandoc, pour ne pas alourdir l'image atomique de dizaines
#  de RPM. WeasyPrint est installé via pip (ne dépend pas d'un RPM Fedora).
# =============================================================================
[pipeline]
# Tag fedora suivi par Renovate (voir .github/renovate.json5) — garder aligné sur la base.
image=registry.fedoraproject.org/fedora:44
additional_packages="pandoc ghostscript python3-pip python3-cffi python3-brotli"
additional_packages="pango cairo gdk-pixbuf2 libffi harfbuzz fontconfig"
additional_packages="google-noto-sans-fonts google-noto-serif-fonts"
init_hooks="pip install --no-cache-dir weasyprint"
pull=true
root=false
replace=true
start_now=false
